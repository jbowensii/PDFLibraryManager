server {
    listen 3000;
    client_max_body_size 500M;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://pdf-lm:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location = /health  { proxy_pass http://pdf-lm:8000; }
    location /docs      { proxy_pass http://pdf-lm:8000; }
    location = /openapi.json { proxy_pass http://pdf-lm:8000; }
}
