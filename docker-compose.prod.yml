services:
  postgres:
    image: postgres:14-alpine
    container_name: pdf-lm-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-pdf_library}
      POSTGRES_USER: ${DB_USER:-pdf_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /mnt/user/appdata/pdf-lm/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pdf_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pdf-lm-redis
    volumes:
      - /mnt/user/appdata/pdf-lm/redis:/data
    restart: unless-stopped

  # Backend API + Celery worker (single container, managed by supervisor)
  pdf-lm:
    image: ghcr.io/jbowensii/pdf-lm:latest
    container_name: pdf-lm-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-pdf_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-pdf_library}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      LIBRARY_ROOT_PATH: /library
      DEBUG: "false"
      LOG_LEVEL: INFO
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - /mnt/user/PDFGameVault:/library
      - /mnt/user/appdata/pdf-lm/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web UI (nginx serves the SPA and proxies /api to the backend)
  frontend:
    image: ghcr.io/jbowensii/pdf-lm-frontend:latest
    container_name: pdf-lm-frontend
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - pdf-lm
    restart: unless-stopped
